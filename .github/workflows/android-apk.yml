name: Android APK

# Builds an installable Android APK for HME Wallet.
#
# Triggers:
#   - push to `android` branch     → debug or release APK (uploaded as artifact)
#   - git tag `android-v*`         → release APK + GitHub Release
#   - manual (workflow_dispatch)   → build with optional debug/release choice
#
# Signing:
#   If the four ANDROID_* secrets below are set, the APK is signed with your
#   release keystore. Otherwise it's a debug-signed APK (still sideloadable
#   for testing on your device — just enable "Install unknown apps").
#
# Required secrets for release signing (Settings → Secrets → Actions):
#   ANDROID_KEYSTORE_BASE64    base64 of your keystore.jks (see generate-keystore.yml)
#   ANDROID_STORE_PASSWORD     store password used when creating the keystore
#   ANDROID_KEY_ALIAS          alias used when creating the keystore
#   ANDROID_KEY_PASSWORD       alias password (usually same as store password)

on:
  push:
    branches: [android]
    tags: ["android-v*"]
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        type: choice
        options: [release, debug]
        default: release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-35 build-tools;35.0.0"

      - uses: oven-sh/setup-bun@v2

      - name: Install web deps
        run: bun install --frozen-lockfile

      - name: Build web app
        run: bun run build

      - name: Add Android platform
        run: |
          if [ ! -d android ]; then
            bunx cap add android
          fi

      - name: Sync Capacitor
        run: bunx cap sync android

      - name: Patch AndroidManifest (perms + deep links)
        run: bun scripts/patch-android-manifest.mjs

      - name: Patch launcher icons (dollar-sign brand mark, dark/light adaptive)
        run: bun scripts/patch-android-icons.mjs

      - name: Derive version
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/android-v* ]]; then
            V="${GITHUB_REF#refs/tags/android-v}"
          else
            V="0.1.$(date +%Y%m%d%H%M)"
          fi
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "version_code=$(date +%y%m%d%H)" >> $GITHUB_OUTPUT

      - name: Decide build type
        id: mode
        run: |
          MODE="${{ github.event.inputs.build_type }}"
          if [[ -z "$MODE" ]]; then
            # Default every push to `android` and every tag build to release,
            # so every APK is signed with the same stable keystore.
            MODE="release"
          fi
          echo "mode=$MODE" >> $GITHUB_OUTPUT

      - name: Require release keystore secrets
        if: steps.mode.outputs.mode == 'release'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=()
          [ -z "$ANDROID_KEYSTORE_BASE64" ] && missing+=(ANDROID_KEYSTORE_BASE64)
          [ -z "$ANDROID_STORE_PASSWORD" ]  && missing+=(ANDROID_STORE_PASSWORD)
          [ -z "$ANDROID_KEY_ALIAS" ]       && missing+=(ANDROID_KEY_ALIAS)
          [ -z "$ANDROID_KEY_PASSWORD" ]    && missing+=(ANDROID_KEY_PASSWORD)
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Release build requires signing secrets, missing: ${missing[*]}"
            echo "::error::Add them in Settings → Secrets → Actions, or re-run with build_type=debug."
            exit 1
          fi

      - name: Decode keystore (release only)
        if: steps.mode.outputs.mode == 'release'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          # Strip CR/LF/spaces the secret may have picked up when pasted, then
          # decode. `-i` tells GNU base64 to ignore any remaining non-alphabet
          # characters instead of aborting with "invalid input".
          printf '%s' "$ANDROID_KEYSTORE_BASE64" \
            | tr -d '\r\n \t' \
            | base64 -d -i > "$RUNNER_TEMP/keystore.jks"
          if ! keytool -list -keystore "$RUNNER_TEMP/keystore.jks" \
                 -storepass "${{ secrets.ANDROID_STORE_PASSWORD }}" >/dev/null 2>&1; then
            echo "::error::Decoded keystore is invalid. Re-encode with: base64 -w0 keystore.jks | pbcopy"
            exit 1
          fi
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/keystore.jks" >> $GITHUB_ENV

      - name: Inject release signing config
        if: steps.mode.outputs.mode == 'release' && env.ANDROID_KEYSTORE_PATH != ''
        run: |
          # Append signingConfigs.release + wire it into buildTypes.release
          # if the block doesn't already exist.
          GRADLE=android/app/build.gradle
          if ! grep -q "signingConfigs" "$GRADLE"; then
            python3 - <<'PY'
          import re
          p = "android/app/build.gradle"
          s = open(p).read()
          inject = """
              signingConfigs {
                  release {
                      def ksPath = System.getenv("ANDROID_KEYSTORE_PATH")
                      if (ksPath) {
                          storeFile file(ksPath)
                          storePassword System.getenv("ANDROID_STORE_PASSWORD")
                          keyAlias System.getenv("ANDROID_KEY_ALIAS")
                          keyPassword System.getenv("ANDROID_KEY_PASSWORD")
                      }
                  }
              }
              buildTypes {
                  release {
                      if (System.getenv("ANDROID_KEYSTORE_PATH")) {
                          signingConfig signingConfigs.release
                      }
                  }
              }
          """
          s = re.sub(r"(defaultConfig\s*\{[^}]*\})", r"\1\n" + inject, s, count=1)
          open(p, "w").write(s)
          PY
          fi

      - name: Build APK
        working-directory: android
        env:
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          VERSION_NAME: ${{ steps.ver.outputs.version }}
          VERSION_CODE: ${{ steps.ver.outputs.version_code }}
        run: |
          chmod +x gradlew
          if [ "${{ steps.mode.outputs.mode }}" = "release" ]; then
            ./gradlew assembleRelease --no-daemon --stacktrace
          else
            ./gradlew assembleDebug --no-daemon --stacktrace
          fi

      - name: Collect APK
        id: apk
        run: |
          mkdir -p out
          MODE="${{ steps.mode.outputs.mode }}"
          if [ "$MODE" = "release" ]; then
            SRC=$(ls android/app/build/outputs/apk/release/*.apk | head -n1)
          else
            SRC=$(ls android/app/build/outputs/apk/debug/*.apk | head -n1)
          fi
          DEST="out/hme-wallet-${{ steps.ver.outputs.version }}-$MODE.apk"
          cp "$SRC" "$DEST"
          (cd out && sha256sum "$(basename "$DEST")" > SHA256SUMS)
          echo "path=$DEST" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: hme-wallet-${{ steps.ver.outputs.version }}-${{ steps.mode.outputs.mode }}
          path: out/*

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/android-v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          name: HME Wallet Android ${{ steps.ver.outputs.version }}
          generate_release_notes: true
