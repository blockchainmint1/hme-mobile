name: Generate Android Keystore

# One-time helper. Run manually, copy the four values it prints into
# GitHub → Settings → Secrets and variables → Actions.
#
# Also uploads the keystore file as an artifact — download and keep it safe
# (1Password + offline backup). Losing it means you can never update existing
# installs on the Play Store.

on:
  workflow_dispatch:
    inputs:
      alias:
        description: "Key alias (default: hme-wallet)"
        required: false
        default: "hme-wallet"

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Generate keystore + random password
        id: gen
        run: |
          ALIAS="${{ github.event.inputs.alias }}"
          PASS="hme-$(openssl rand -hex 12)"
          KS="hme-wallet-release.jks"

          keytool -genkeypair -v \
            -keystore "$KS" \
            -alias "$ALIAS" \
            -keyalg RSA -keysize 4096 -validity 10950 \
            -storepass "$PASS" -keypass "$PASS" \
            -dname "CN=HME Wallet, OU=HME, O=Honest Money, C=US"

          B64=$(base64 -w 0 "$KS")

          echo "keystore_base64=$B64" >> $GITHUB_OUTPUT
          echo "alias=$ALIAS" >> $GITHUB_OUTPUT
          echo "password=$PASS" >> $GITHUB_OUTPUT

          mkdir -p keystore-info
          {
            echo "ANDROID_KEYSTORE_BASE64="
            echo "$B64"
            echo ""
            echo "ANDROID_KEY_ALIAS=$ALIAS"
            echo "ANDROID_STORE_PASSWORD=$PASS"
            echo "ANDROID_KEY_PASSWORD=$PASS"
          } > keystore-info/secrets.txt

      - name: Upload keystore artifact
        uses: actions/upload-artifact@v4
        with:
          name: hme-wallet-release-keystore
          path: |
            hme-wallet-release.jks
            keystore-info/secrets.txt

      - name: Print secrets for copy-paste
        run: |
          echo "========================================"
          echo "COPY THESE INTO GITHUB SECRETS"
          echo "========================================"
          echo ""
          echo "Secret: ANDROID_KEYSTORE_BASE64"
          echo "${{ steps.gen.outputs.keystore_base64 }}"
          echo ""
          echo "Secret: ANDROID_KEY_ALIAS"
          echo "${{ steps.gen.outputs.alias }}"
          echo ""
          echo "Secret: ANDROID_STORE_PASSWORD"
          echo "${{ steps.gen.outputs.password }}"
          echo ""
          echo "Secret: ANDROID_KEY_PASSWORD"
          echo "${{ steps.gen.outputs.password }}"
          echo ""
          echo "========================================"
          echo "Download the 'hme-wallet-release-keystore' artifact"
          echo "and store the .jks file securely (1Password + offline)."
          echo "========================================"
